<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Understanding of Mathmatics : Instructor Page</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  
  <style>
    /* 기본 레이아웃 */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Pretendard, sans-serif; }
    body { background-color: #f0f2f5; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    header { 
      background-color: #795548; 
      color: white; padding: 10px 20px; 
      display: flex; justify-content: space-between; align-items: center;
      height: 50px; flex-shrink: 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    header h1 { font-size: 1rem; font-weight: 700; }
    header p { font-size: 0.75rem; opacity: 0.8; text-align: right; }

    main { flex: 1; display: flex; flex-direction: row; overflow: hidden; background: #e9ecef; }

    #sidebar { 
      width: 18%; min-width: 180px; max-width: 250px;
      background: #ffffff; padding: 20px 15px; 
      display: flex; flex-direction: column; gap: 15px;
      border-right: 1px solid #ddd; box-shadow: 2px 0 5px rgba(0,0,0,0.05);
      z-index: 10;
    }

    .section-title { font-size: 0.75rem; color: #795548; font-weight: 700; margin-bottom: -10px; text-transform: uppercase; }
    
    select { 
      width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; 
      font-size: 0.9rem; background-color: #f8f9fa; cursor: pointer; outline: none;
    }

    /* 동영상 버튼 스타일 (선명한 레드) */
    .video-control-group { display: flex; gap: 8px; margin-top: 10px; }
    .btn-video { 
      flex: 1; background-color: #FF0000; color: white; border: none;
      border-radius: 6px; padding: 12px; font-weight: 800; font-size: 0.9rem;
      cursor: not-allowed; opacity: 0.4; transition: all 0.2s;
      box-shadow: 0 4px 0px #b02a37;
    }
    
    .btn-video.active { opacity: 1; cursor: pointer; }

    /* 3번 효과: 재생 중일 때 흰색 배경 + 빨간 깜빡임 */
    .btn-video.playing {
      background-color: #ffffff !important;
      color: #FF0000 !important;
      border: 3px solid #FF0000 !important;
      opacity: 1 !important;
      animation: pulse-red 1.2s infinite !important;
      box-shadow: none;
    }

    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); transform: scale(1); }
      50% { box-shadow: 0 0 0 12px rgba(255, 0, 0, 0); transform: scale(1.03); }
      100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); transform: scale(1); }
    }

    #stopVideoBtn { 
      width: 100%; background: #495057; color: white; margin-top: 8px; 
      display: none; padding: 10px; font-size: 0.8rem; border-radius: 6px;
    }

    /* 페이지 제어 스타일 */
    .page-controls { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    .nav-btns { display: flex; gap: 5px; align-items: center; justify-content: center; background: #f1f3f5; padding: 5px; border-radius: 8px; }
    #pageInfo { font-weight: 800; font-size: 1.1rem; color: #007bff; min-width: 85px; text-align: center; }

    button.nav { flex: 1; background: #495057; color: white; padding: 12px; border-radius: 6px; font-weight: bold; }
    #startBtn { background: #28a745; color: white; margin-top: auto; padding: 15px; font-size: 1rem; border-radius: 6px; font-weight: bold; }
    #statusLine { font-size: 0.7rem; color: #6c757d; text-align: center; margin-top: 5px; font-weight: bold; }

    #viewerWrap { flex: 1; background: #525659; position: relative; }
    iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

  <header>
    <h1>수학의 이해 (Understanding of Mathmatics)</h1>
    <div>
      <p>HOSEO UNIVERSITY</p>
      <p>Prof. BAE SOO KI</p>
    </div>
  </header>

  <main>
    <div id="sidebar">
      <p class="section-title">Lecture Select</p>
      <select id="chapterSelect"></select>
      <select id="fileSelect"></select>

      <p class="section-title" style="margin-top:15px;">Video Control</p>
      <div class="video-control-group">
        <button id="video1Btn" class="btn-video">동영상 1</button>
        <button id="video2Btn" class="btn-video">동영상 2</button>
      </div>
      <button id="stopVideoBtn">⏹ 영상 종료 (교안 복귀)</button>

      <p class="section-title" style="margin-top:15px;">Page Control</p>
      <div class="page-controls">
        <div class="nav-btns">
          <button id="prevBtn" class="nav">Prev</button>
          <div id="pageInfo">1 / -</div>
          <button id="nextBtn" class="nav">Next</button>
        </div>
      </div>

      <p id="statusLine">● 수업 대기 중 (학생 화면 정지)</p>
      <button id="startBtn">수업 시작 신호 전송</button>
    </div>

    <div id="viewerWrap">
      <iframe id="pdfFrame"></iframe>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuXErMs-3Wj24Xo-o40mZRQUHLLX1r-0I",
      authDomain: "lecture-uom.firebaseapp.com",
      databaseURL: "https://lecture-uom-default-rtdb.firebaseio.com",
      projectId: "lecture-uom",
      storageBucket: "lecture-uom.firebasestorage.app",
      messagingSenderId: "1071262547326",
      appId: "1:1071262547326:web:ca2999788ce8422d12072f",
      measurementId: "G-QW41EHM2VL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const roomId = "class101";

    const chapters = {
      chapter1: ["1-1.pdf", "1-2.pdf", "1-3.pdf", "1-4.pdf", "1-5.pdf", "11-1.pdf"],
      chapter2: ["2-1.pdf", "2-2.pdf", "2-3.pdf", "2-4.pdf", "2-5.pdf"],
      chapter3: ["3-1.pdf", "3-2.pdf", "3-3.pdf", "3-4.pdf", "3-5.pdf", "3-6.pdf", "3-7.pdf"],
      chapter4: ["4-1.pdf", "4-2.pdf", "4-3.pdf", "4-4.pdf", "4-5.pdf", "4-6.pdf", "4-7.pdf"],
      chapter5: ["5-1.pdf", "5-2.pdf", "5-3.pdf", "5-4.pdf", "5-5.pdf", "5-6.pdf"],
      chapter6: ["6-1.pdf", "6-2.pdf", "6-3.pdf", "6-4.pdf", "6-5.pdf"],
      chapter7: ["7-1.pdf", "7-2.pdf", "7-3.pdf", "7-4.pdf", "7-5.pdf", "7-6.pdf"],
      chapter8: ["8-1.pdf", "8-2.pdf", "8-3.pdf", "8-4.pdf", "8-5.pdf", "8-6.pdf", "8-7.pdf", "8-8.pdf"],
      chapter9: ["9-1.pdf", "9-2.pdf", "9-3.pdf", "9-4.pdf", "9-5.pdf", "9-6.pdf", "9-7.pdf", "9-8.pdf"],
      chapter11: ["11-1.pdf", "11-2.pdf", "11-3.pdf", "11-4.pdf", "11-5.pdf"],
      chapter12: ["12-1.pdf", "12-2.pdf", "12-3.pdf", "12-4.pdf", "12-5.pdf"],
      chapter13: ["13-1.pdf", "13-2.pdf", "13-3.pdf", "13-4.pdf", "13-5.pdf", "13-6.pdf", "13-7.pdf"],
      chapter14: ["14-1.pdf", "14-2.pdf", "14-3.pdf", "14-4.pdf", "14-5.pdf", "14-6.pdf", "14-56Q.pdf"],
      chapterex: ["ex-2.pdf", "ex-3.pdf", "ex-4.pdf", "ex-5.pdf", "ex-6.pdf", "ex-7.pdf", "ex-8.pdf", "ex-9.pdf", "ex-11.pdf", "ex-12.pdf", "ex-13-1.pdf", "ex-13-2.pdf", "ex-14.pdf"]
    };

    let currentChapter = "chapter1";
    let currentFile = chapters.chapter1[0];
    let currentPage = 1;
    let totalPages = 0; 
    let isLessonStarted = false; 
    let currentVideoID = "";

    const chapterSelect = document.getElementById("chapterSelect");
    const fileSelect = document.getElementById("fileSelect");
    const pageInfo = document.getElementById("pageInfo");
    const pdfFrame = document.getElementById("pdfFrame");
    const statusLine = document.getElementById("statusLine");
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const v1Btn = document.getElementById("video1Btn");
    const v2Btn = document.getElementById("video2Btn");
    const stopVBtn = document.getElementById("stopVideoBtn");

    // 장 선택 초기화
    for (const ch in chapters) {
      const option = document.createElement("option");
      option.value = ch;
      option.textContent = ch.toUpperCase();
      chapterSelect.appendChild(option);
    }

    function updateFileOptions(ch) {
      fileSelect.innerHTML = "";
      chapters[ch].forEach((file) => {
        const option = document.createElement("option");
        option.value = file;
        option.textContent = file;
        fileSelect.appendChild(option);
      });
      currentFile = chapters[ch][0];
    }

    // 페이지 번호 동기화 함수
    function syncTotalPages() {
      try {
        const viewerApp = pdfFrame.contentWindow.PDFViewerApplication;
        if (viewerApp && viewerApp.pagesCount && viewerApp.pagesCount > 0) {
          totalPages = viewerApp.pagesCount;
          updatePageDisplay();
        } else {
          setTimeout(syncTotalPages, 500);
        }
      } catch (e) {
        setTimeout(syncTotalPages, 500);
      }
    }

    function updatePageDisplay() {
      pageInfo.textContent = `${currentPage} / ${totalPages > 0 ? totalPages : '-'}`;
      prevBtn.disabled = (currentPage <= 1);
      prevBtn.style.opacity = (currentPage <= 1) ? "0.4" : "1";
      
      if (totalPages > 0 && currentPage >= totalPages) {
        nextBtn.disabled = true;
        nextBtn.style.opacity = "0.4";
      } else {
        nextBtn.disabled = false;
        nextBtn.style.opacity = "1";
      }
    }

    async function updateView() {
      const pdfPath = `${currentChapter}/${currentFile}`;
      const newSrc = `/pdfjs_clean/web/viewer.html?file=/${pdfPath}#page=${currentPage}`;
      
      if (pdfFrame.src !== newSrc) {
          pdfFrame.src = newSrc;
      }
      
      updatePageDisplay();

      try {
        await set(ref(db, `rooms/${roomId}`), {
          pdf: pdfPath,
          page: currentPage,
          started: isLessonStarted, 
          videoID: currentVideoID,
          updatedAt: Date.now()
        });
        
        if (!isLessonStarted) {
          statusLine.textContent = "● 수업 대기 중 (학생 화면 정지)";
          statusLine.style.color = "#6c757d";
        } else {
          statusLine.textContent = currentVideoID ? "● 영상 송출 중" : "● Synced: " + currentFile;
          statusLine.style.color = "#28a745";
        }
      } catch (err) { console.error(err); }
    }

    // 동영상 재생 로직
    function playVideo(id, btn) {
      if (!isLessonStarted) {
        alert("수업 시작 버튼을 먼저 눌러주세요!");
        return;
      }
      currentVideoID = id;
      v1Btn.classList.remove('playing');
      v2Btn.classList.remove('playing');
      btn.classList.add('playing');
      stopVBtn.style.display = "block";
      updateView();
    }

    stopVBtn.onclick = function() {
      currentVideoID = "";
      v1Btn.classList.remove('playing');
      v2Btn.classList.remove('playing');
      stopVBtn.style.display = "none";
      updateView();
    }

    // 요청하신 영상 ID 반영
    v1Btn.onclick = () => playVideo("tictYHEEUdg", v1Btn); 
    v2Btn.onclick = () => playVideo("OSN-7LdP3Cw", v2Btn); 

    // 수업 시작
    document.getElementById("startBtn").onclick = function() {
      isLessonStarted = true;
      this.textContent = "✅ 수업 진행 중";
      this.style.background = "#007bff";
      v1Btn.classList.add('active');
      v2Btn.classList.add('active');
      updateView();
    };

    // 장/파일 변경 이벤트
    chapterSelect.onchange = (e) => { 
      currentChapter = e.target.value; 
      updateFileOptions(currentChapter); 
      currentPage = 1; 
      totalPages = 0; 
      updateView(); 
    };
    
    fileSelect.onchange = (e) => { 
      currentFile = e.target.value; 
      currentPage = 1; 
      totalPages = 0; 
      updateView(); 
    };

    prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; updateView(); } };
    nextBtn.onclick = () => { if (totalPages === 0 || currentPage < totalPages) { currentPage++; updateView(); } };

    pdfFrame.onload = () => { syncTotalPages(); };

    updateFileOptions(currentChapter);
    updateView(); 
  </script>
</body>
</html>
