<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수업 보기</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      background: white;
      border-bottom: 1px solid #ddd;
      box-sizing: border-box;
      min-height: 56px;
    }

    .left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    #titleText {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      word-break: break-all;
    }

    #pageInfo {
      font-size: 13px;
      color: #555;
    }

    #brandText {
      font-size: 12px;
      color: #666;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      text-align: right;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 56px);
      border: none;
      background: white;
      display: block;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="left">
      <div id="titleText">수업 연결 중...</div>
      <div id="pageInfo">페이지 정보 대기 중...</div>
    </div>
    <div id="brandText">Understanding of Mathematics with Prof. SOOKI BAE</div>
  </div>

  <iframe id="pdfFrame"></iframe>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuXErMs-3Wj24Xo-o40mZRQUHLLX1r-0I",
      authDomain: "lecture-uom.firebaseapp.com",
      databaseURL: "https://lecture-uom-default-rtdb.firebaseio.com",
      projectId: "lecture-uom",
      storageBucket: "lecture-uom.firebasestorage.app",
      messagingSenderId: "1071262547326",
      appId: "1:1071262547326:web:ca2999788ce8422d12072f",
      measurementId: "G-QW41EHM2VL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const roomId = "class101";

    const titleText = document.getElementById("titleText");
    const pageInfo = document.getElementById("pageInfo");
    const pdfFrame = document.getElementById("pdfFrame");

    function formatDisplayName(pdfPath) {
      if (!pdfPath) return "수업 자료";

      const clean = pdfPath.replace(".pdf", "");
      const parts = clean.split("/");

      if (parts.length === 2) {
        const folder = parts[0];
        const file = parts[1];

        if (folder === "chapterex") {
          return `연습 · ${file}`;
        }

        if (folder.startsWith("chapter")) {
          const num = folder.replace("chapter", "");
          return `${num}장 · ${file}`;
        }
      }

      return clean;
    }

    onValue(
      ref(db, `rooms/${roomId}`),
      (snapshot) => {
        const data = snapshot.val();

        if (!data) {
          titleText.textContent = "수업 연결 대기 중...";
          pageInfo.textContent = "교수 화면에서 자료를 열면 표시됩니다.";
          return;
        }

        const pdf = data.pdf || "chapter1/1-1.pdf";
        const page = data.page || 1;

        titleText.textContent = formatDisplayName(pdf);
        pageInfo.textContent = `현재 페이지 ${page}`;
        pdfFrame.src = `/pdfjs/web/viewer.html?file=/${pdf}#page=${page}`;
      },
      (error) => {
        titleText.textContent = "연결 오류";
        pageInfo.textContent = "데이터를 불러오지 못했습니다.";
        console.error(error);
      }
    );
  </script>
</body>
</html>
