<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생용 PDF 뷰어</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
    }
    .topbar {
      padding: 12px;
      background: white;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    #status {
      color: red;
      font-size: 14px;
      font-weight: normal;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span id="pageInfo">교수 화면 대기 중...</span>
    <span id="status">준비 중...</span>
  </div>

  <iframe id="pdfFrame"></iframe>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuXErMs-3Wj24Xo-o40mZRQUHLLX1r-0I",
      authDomain: "lecture-uom.firebaseapp.com",
      databaseURL: "https://lecture-uom-default-rtdb.firebaseio.com",
      projectId: "lecture-uom",
      storageBucket: "lecture-uom.firebasestorage.app",
      messagingSenderId: "1071262547326",
      appId: "1:1071262547326:web:ca2999788ce8422d12072f",
      measurementId: "G-QW41EHM2VL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const roomId = "class101";
    const pageInfo = document.getElementById("pageInfo");
    const status = document.getElementById("status");
    const pdfFrame = document.getElementById("pdfFrame");

    onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
      const data = snapshot.val();

      if (!data) {
        pageInfo.textContent = "교수 화면 대기 중...";
        status.textContent = "데이터 없음";
        return;
      }

      const pdf = data.pdf || "4-1.pdf";
      const page = data.page || 1;

      pageInfo.textContent = `현재 페이지: ${page}`;
      pdfFrame.src = `./${pdf}?v=${Date.now()}#page=${page}`; 
      status.textContent = "읽기 성공";
    }, (error) => {
      status.textContent = "읽기 에러: " + error.message;
    });
  </script>
</body>
</html>
