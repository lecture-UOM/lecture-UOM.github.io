<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>학생용 테스트</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 30px 20px;
      background: #f5f5f5;
      text-align: center;
    }
    .box {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    #pageInfo {
      margin-top: 20px;
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>학생용 페이지</h1>
    <p>교수가 넘긴 페이지 번호가 여기에 자동으로 표시됩니다.</p>
    <div id="pageInfo">연결 중...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "여기에입력",
      authDomain: "여기에입력",
      databaseURL: "여기에입력",
      projectId: "여기에입력",
      storageBucket: "여기에입력",
      messagingSenderId: "여기에입력",
      appId: "여기에입력"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const roomId = "class101";
    const pageInfo = document.getElementById("pageInfo");

    onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
      const data = snapshot.val();
      if (!data) {
        pageInfo.textContent = "교사 화면 대기 중...";
        return;
      }
      pageInfo.textContent = `현재 페이지: ${data.page}`;
    });
  </script>
</body>
</html>
