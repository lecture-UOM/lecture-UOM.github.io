<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수학의 이해</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
    }

    #viewerWrap {
      display: none;
    }

    iframe {
      width: 100%;
      height: 100vh;
      border: none;
      background: white;
      display: block;
    }

    /* 처음 보이는 표지 화면 */
    #splashScreen {
      height: 100vh;
      background: #efefef;
      position: relative;
      overflow: hidden;
    }

    .splash-center {
      position: absolute;
      top: 42%;
      left: 52%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #7a3000;
      width: 80%;
    }

    .splash-title-ko {
      font-size: clamp(34px, 6vw, 88px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 14px;
    }

    .splash-title-en {
      font-size: clamp(18px, 2vw, 30px);
      font-weight: 700;
      color: #9a5a2e;
    }

    .splash-badge {
      position: absolute;
      right: 4%;
      top: 12%;
      width: min(220px, 24vw);
      height: min(220px, 24vw);
      min-width: 120px;
      min-height: 120px;
      background: #8b531f;
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: clamp(54px, 9vw, 120px);
      font-weight: 800;
    }

    .splash-bottom-left {
      position: absolute;
      left: 28px;
      bottom: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #7a3000;
      font-weight: 700;
      font-size: clamp(12px, 1.4vw, 18px);
    }

    .splash-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #8b531f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    @media (max-width: 768px) {
      .splash-center {
        top: 44%;
        left: 50%;
        width: 88%;
      }

      .splash-badge {
        right: 4%;
        top: 10%;
        border-radius: 20px;
      }

      .splash-bottom-left {
        left: 16px;
        bottom: 14px;
        gap: 8px;
      }

      .splash-icon {
        width: 38px;
        height: 38px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div id="splashScreen">
    <div class="splash-badge">U</div>

    <div class="splash-center">
      <div class="splash-title-ko">수학의 이해</div>
      <div class="splash-title-en">Understanding of Mathematics</div>
    </div>

    <div class="splash-bottom-left">
      <div class="splash-icon">✎</div>
      <div>HOSEO UNIVERSITY BAE SOO KI</div>
    </div>
  </div>

  <div id="viewerWrap">
    <iframe id="pdfFrame"></iframe>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
     apiKey: "AIzaSyAuXErMs-3Wj24Xo-o40mZRQUHLLX1r-0I",
      authDomain: "lecture-uom.firebaseapp.com",
      databaseURL: "https://lecture-uom-default-rtdb.firebaseio.com",
      projectId: "lecture-uom",
      storageBucket: "lecture-uom.firebasestorage.app",
      messagingSenderId: "1071262547326",
      appId: "1:1071262547326:web:ca2999788ce8422d12072f",
      measurementId: "G-QW41EHM2VL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const roomId = "class101";

    const pdfFrame = document.getElementById("pdfFrame");
    const splashScreen = document.getElementById("splashScreen");
    const viewerWrap = document.getElementById("viewerWrap");

    function hideViewerButtons() {
      try {
        const iframeDoc = pdfFrame.contentDocument || pdfFrame.contentWindow.document;
        if (!iframeDoc) return;

        const selectors = [
          "#openFile",
          "#secondaryOpenFile",
          "#printButton",
          "#downloadButton",
          "#secondaryPrint",
          "#secondaryDownload"
        ];

        selectors.forEach((selector) => {
          const el = iframeDoc.querySelector(selector);
          if (el) el.style.display = "none";
        });
      } catch (e) {
        console.log("버튼 숨기기 실패", e);
      }
    }

    pdfFrame.addEventListener("load", () => {
      setTimeout(hideViewerButtons, 500);
      setTimeout(hideViewerButtons, 1500);
      setTimeout(hideViewerButtons, 3000);
    });

    onValue(
      ref(db, `rooms/${roomId}`),
      (snapshot) => {
        const data = snapshot.val();

        if (!data) {
          splashScreen.style.display = "block";
          viewerWrap.style.display = "none";
          return;
        }

        const pdf = data.pdf || "chapter1/1-1.pdf";
        const page = data.page || 1;

        splashScreen.style.display = "none";
        viewerWrap.style.display = "block";

        pdfFrame.src = `/pdfjs_clean/web/viewer.html?file=/${pdf}#page=${page}`;
      },
      (error) => {
        splashScreen.style.display = "block";
        viewerWrap.style.display = "none";
        console.error(error);
      }
    );
  </script>
</body>
</html>
