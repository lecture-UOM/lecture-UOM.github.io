<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 강의 페이지</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 40px 20px;
      text-align: center;
      background: #f7f7f7;
    }
    .box {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      margin-bottom: 12px;
    }
    p {
      color: #444;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>강의용 페이지 테스트</h1>
    <p>이 페이지는 GitHub Pages로 만든 첫 웹페이지입니다.</p>
    <p>다음 단계에서 PDF 강의자료와 실시간 동기화 기능을 붙일 예정입니다.</p>
    <a class="btn" href="#">준비 중</a>
  </div>
</body>
</html>
