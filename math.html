<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>수학의이해 (Understanding of Mathematics)</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">

  <style>
    /* 기본 설정 */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Pretendard, sans-serif; }
    body, html { width: 100%; height: 100%; overflow: hidden; background-color: #efefef; }

    /* 표지 화면 (Splash Screen) */
    #splashScreen {
      position: absolute; width: 100%; height: 100%;
      background-color: #efefef; display: flex; flex-direction: column;
      justify-content: center; align-items: center; z-index: 100;
      transition: opacity 0.8s ease, visibility 0.8s;
    }
    #coverImage { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* 대기 중 애니메이션 */
    .waiting-msg {
      position: absolute; bottom: calc(20px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      font-size: 0.85rem; color: #795548; font-weight: 500;
      display: flex; align-items: center; gap: 8px;
    }
    .waiting-dot {
      width: 6px; height: 6px; background-color: #795548; border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    .waiting-dot:nth-child(2) { animation-delay: 0.3s; }
    .waiting-dot:nth-child(3) { animation-delay: 0.6s; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    /* PDF 뷰어 영역 */
    #viewerWrap {
      display: none; width: 100%; height: 100%; z-index: 10;
      padding-top: env(safe-area-inset-top); background: white;
    }
    iframe { width: 100%; height: 100%; border: none; display: block; background: white; }

    /* [추가] 동영상 레이어 스타일 */
    #videoOverlay {
      display: none; /* 평소엔 숨김 */
      position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: black; z-index: 200; /* PDF보다 위에 뜸 */
    }
    #ytPlayer { width: 100%; height: 100%; border: none; }
  </style>
</head>
<body>

  <div id="splashScreen">
    <img id="coverImage" src="/cover.png" alt="수학의이해 표지">
    <div class="waiting-msg" id="waitingMsg">
      <div class="waiting-dot"></div>
      <div class="waiting-dot"></div>
      <div class="waiting-dot"></div>
      <span>교수님의 수업 시작을 기다리고 있습니다...</span>
    </div>
  </div>

  <div id="viewerWrap">
    <iframe id="pdfFrame"></iframe>
  </div>

  <div id="videoOverlay">
    <iframe id="ytPlayer" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    // Firebase 설정 (교수님 설정값 유지)
    const firebaseConfig = {
      apiKey: "AIzaSyAuXErMs-3Wj24Xo-o40mZRQUHLLX1r-0I",
      authDomain: "lecture-uom.firebaseapp.com",
      databaseURL: "https://lecture-uom-default-rtdb.firebaseio.com",
      projectId: "lecture-uom",
      storageBucket: "lecture-uom.firebasestorage.app",
      messagingSenderId: "1071262547326",
      appId: "1:1071262547326:web:ca2999788ce8422d12072f",
      measurementId: "G-QW41EHM2VL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const roomId = "class101";

    const splashScreen = document.getElementById("splashScreen");
    const viewerWrap = document.getElementById("viewerWrap");
    const pdfFrame = document.getElementById("pdfFrame");
    const videoOverlay = document.getElementById("videoOverlay");
    const ytPlayer = document.getElementById("ytPlayer");

    let switchedToViewer = false;

    // 수업 시작 안내 팝업 함수
    function playStartAnimation() {
      const overlay = document.createElement('div');
      overlay.innerHTML = `
          <h1 style="color: white; font-size: 1.5rem; font-weight: bold; text-align: center;">🎉 수업이 시작되었습니다!</h1>
          <p style="color: #93C5FD; font-size: 0.9rem; margin-top: 0.5rem;">화면 동기화 중...</p>
      `;
      overlay.style.cssText = `
          position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
          background: rgba(30, 58, 138, 0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; 
          z-index: 9999; transition: opacity 0.4s;
      `;
      document.body.appendChild(overlay);
      setTimeout(() => { overlay.style.opacity = '0'; setTimeout(() => overlay.remove(), 400); }, 2000);
    }

    // Firebase 실시간 감시
    onValue(ref(db, `rooms/${roomId}`), (snapshot) => {
      const data = snapshot.val();
      if (!data) return;

      // [1] 수업 시작 여부 체크
      if (data.started === false) {
        splashScreen.style.display = "flex";
        viewerWrap.style.display = "none";
        videoOverlay.style.display = "none";
        switchedToViewer = false;
        return;
      }

      // [2] 동영상 재생 여부 체크 (최우선 순위)
      if (data.videoID && data.videoID !== "") {
        videoOverlay.style.display = "block";
        const videoSrc = `https://www.youtube.com/embed/${data.videoID}?autoplay=1&rel=0&showinfo=0&modestbranding=1`;
        if (ytPlayer.src !== videoSrc) {
          ytPlayer.src = videoSrc;
        }
      } else {
        videoOverlay.style.display = "none";
        ytPlayer.src = ""; // 영상 주소 초기화 (정지)
      }

      // [3] PDF 교안 동기화 처리
      const pdf = data.pdf || "chapter1/1-1.pdf";
      const page = data.page || 1;

      if (!switchedToViewer) {
        playStartAnimation();
        splashScreen.style.display = "none";
        viewerWrap.style.display = "block";
        pdfFrame.src = `/pdfjs_clean/web/viewer.html?file=/${pdf}#page=${page}`;
        switchedToViewer = true;
      } else {
        const newSrc = `/pdfjs_clean/web/viewer.html?file=/${pdf}#page=${page}`;
        if (pdfFrame.src !== newSrc) {
          pdfFrame.src = newSrc;
        }
      }
    });
  </script>
</body>
</html>
