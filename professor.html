<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교수용 PDF 뷰어</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px;
      background: white;
      border-bottom: 1px solid #ddd;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }
    #pageInfo {
      font-weight: bold;
    }
    #status {
      color: red;
      font-size: 14px;
    }
    iframe {
      width: 100%;
      height: calc(100vh - 70px);
      border: none;
      background: white;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <button onclick="prevPage()">이전</button>
    <button onclick="nextPage()">다음</button>
    <span id="pageInfo">현재 페이지: 1</span>
    <span id="status">준비 중...</span>
  </div>

  <iframe id="pdfFrame" src="./chapter1.pdf#page=1"></iframe>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuXErMs-3Wj24Xo-o40mZRQUHLLX1r-0I",
      authDomain: "lecture-uom.firebaseapp.com",
      databaseURL: "https://lecture-uom-default-rtdb.firebaseio.com",
      projectId: "lecture-uom",
      storageBucket: "lecture-uom.firebasestorage.app",
      messagingSenderId: "1071262547326",
      appId: "1:1071262547326:web:ca2999788ce8422d12072f",
      measurementId: "G-QW41EHM2VL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const roomId = "class101";
    const pdfName = "4-1.pdf";
    let currentPage = 1;

    const pageInfo = document.getElementById("pageInfo");
    const status = document.getElementById("status");
    const pdfFrame = document.getElementById("pdfFrame");

    async function updatePage() {
      try {
        pdfFrame.src = `./${pdfName}?v=${Date.now()}#page=${currentPage}`; 
        pageInfo.textContent = `현재 페이지: ${currentPage}`;

        await set(ref(db, `rooms/${roomId}`), {
          pdf: pdfName,
          page: currentPage,
          updatedAt: Date.now()
        });

        status.textContent = "쓰기 성공";
      } catch (err) {
        status.textContent = "쓰기 에러: " + err.message;
      }
    }

    window.nextPage = async function () {
      currentPage++;
      await updatePage();
    };

    window.prevPage = async function () {
      if (currentPage > 1) {
        currentPage--;
        await updatePage();
      }
    };

    updatePage();
  </script>
</body>
</html>
