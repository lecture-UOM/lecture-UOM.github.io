<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>교수용 테스트</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 30px 20px;
      background: #f5f5f5;
      text-align: center;
    }
    .box {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    button {
      padding: 12px 18px;
      margin: 8px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #pageInfo {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
    #status {
      margin-top: 18px;
      color: red;
      white-space: pre-wrap;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>교수용 페이지</h1>
    <p>버튼을 누르면 Firebase에 현재 페이지 번호를 저장합니다.</p>
    <button onclick="prevPage()">이전</button>
    <button onclick="nextPage()">다음</button>
    <div id="pageInfo">현재 페이지: 1</div>
    <div id="status">준비 중...</div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAuXErMs-3Wj24Xo-o40mZRQUHLLX1r-0I",
      authDomain: "lecture-uom.firebaseapp.com",
      databaseURL: "https://lecture-uom-default-rtdb.firebaseio.com",
      projectId: "lecture-uom",
      storageBucket: "lecture-uom.firebasestorage.app",
      messagingSenderId: "1071262547326",
      appId: "1:1071262547326:web:ca2999788ce8422d12072f",
      measurementId: "G-QW41EHM2VL" 
    };

    const status = document.getElementById("status");
    const pageInfo = document.getElementById("pageInfo");

    let currentPage = 1;
    const roomId = "class101";

    let db;

    try {
      const app = initializeApp(firebaseConfig);
      db = getDatabase(app);
      status.textContent = "Firebase 연결 성공";
    } catch (err) {
      status.textContent = "초기화 에러: " + err.message;
    }

    async function updatePage() {
      try {
        pageInfo.textContent = `현재 페이지: ${currentPage}`;
        await set(ref(db, `rooms/${roomId}`), {
          page: currentPage,
          updatedAt: Date.now()
        });
        status.textContent = `쓰기 성공: page=${currentPage}`;
      } catch (err) {
        status.textContent = "쓰기 에러: " + err.message;
      }
    }

    window.nextPage = async function () {
      currentPage++;
      await updatePage();
    };

    window.prevPage = async function () {
      if (currentPage > 1) {
        currentPage--;
        await updatePage();
      }
    };

    updatePage();
  </script>
</body>
</html>
