<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UoM 교수용 - Side Dashboard</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  
  <style>
    /* 기본 설정 */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Pretendard, sans-serif; }
    body { background-color: #f0f2f5; color: #333; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* 상단 슬림 헤더 */
    header { 
      background: linear-gradient(135deg, #1a2a6c 0%, #2c3e50 100%); 
      color: white; padding: 10px 20px; 
      display: flex; justify-content: space-between; align-items: center;
      height: 50px; flex-shrink: 0;
    }
    header h1 { font-size: 1rem; font-weight: 700; letter-spacing: -0.5px; }
    header p { font-size: 0.75rem; opacity: 0.8; text-align: right; line-height: 1.2; }

    /* 메인 레이아웃 (가로 배치) */
    main { flex: 1; display: flex; flex-direction: row; overflow: hidden; background: #e9ecef; }

    /* [좌측 사이드바] 화면의 약 1/6 (16%) 배치 */
    #sidebar { 
      width: 18%; /* 1/6에 가까운 18%로 설정 (최소폭 확보용) */
      min-width: 180px; max-width: 250px;
      background: #ffffff; padding: 20px 15px; 
      display: flex; flex-direction: column; gap: 15px;
      border-right: 1px solid #ddd; box-shadow: 2px 0 5px rgba(0,0,0,0.05);
      z-index: 10;
    }

    /* 사이드바 내부 그룹 */
    .section-title { font-size: 0.75rem; color: #888; font-weight: 700; margin-bottom: -10px; text-transform: uppercase; }
    
    select { 
      width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; 
      font-size: 0.9rem; background-color: #f8f9fa; cursor: pointer; outline: none;
    }
    select:focus { border-color: #007bff; }

    /* 페이지 조작 영역 */
    .page-controls { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
    
    .nav-btns { display: flex; gap: 5px; align-items: center; justify-content: center; background: #f1f3f5; padding: 5px; border-radius: 8px; }
    #pageInfo { font-weight: 800; font-size: 1.1rem; color: #007bff; min-width: 50px; text-align: center; }

    button { 
      padding: 12px; border: none; border-radius: 6px; font-weight: 600; 
      cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
    }
    
    button.nav { flex: 1; background: #495057; color: white; }
    button.nav:hover { background: #343a40; }
    button.nav:active { transform: scale(0.95); }

    /* 수업 시작 버튼 (강조) */
    #startBtn { 
      background: #28a745; color: white; margin-top: auto; /* 아래쪽으로 밀기 */
      padding: 15px; font-size: 1rem; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.2);
    }
    #startBtn:hover { background: #218838; }

    #statusLine { font-size: 0.7rem; color: #28a745; text-align: center; margin-top: 5px; }

    /* [우측 PDF 영역] 화면의 5/6 차지 */
    #viewerWrap { flex: 1; background: #525659; position: relative; }
    iframe { width: 100%; height: 100%; border: none; display: block; }

  </style>
</head>
<body>

  <header>
    <h1>UoM : 수학의 이해</h1>
    <div>
      <p>HOSEO UNIVERSITY</p>
      <p>Prof. BAE SOO KI</p>
    </div>
  </header>

  <main>
    <div id="sidebar">
      <p class="section-title">Lecture Select</p>
      <select id="chapterSelect"></select>
      <select id="fileSelect"></select>

      <p class="section-title" style="margin-top:10px;">Page Control</p>
      <div class="page-controls">
        <div class="nav-btns">
          <button id="prevBtn" class="nav">Prev</button>
          <div id="pageInfo">1 P</div>
          <button id="nextBtn" class="nav">Next</button>
        </div>
      </div>

      <p id="statusLine">● System Ready</p>
      
      <button id="startBtn">수업 시작 신호 전송</button>
    </div>

    <div id="viewerWrap">
      <iframe id="pdfFrame"></iframe>
    </div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    // ----- [필독] 교수님의 Firebase 설정값을 여기에 꼭 넣어주세요 -----
    const firebaseConfig = {
      apiKey: "교수님의_apiKey",
      authDomain: "교수님의_authDomain",
      databaseURL: "https://lecture-uom-default-rtdb.firebaseio.com",
      projectId: "교수님의_projectId",
      storageBucket: "교수님의_storageBucket",
      messagingSenderId: "교수님의_messagingSenderId",
      appId: "교수님의_appId"
    };
    // -----------------------------------------------------------

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const roomId = "class101";

    const chapters = {
      chapter1: ["1-1.pdf", "1-2.pdf", "1-3.pdf", "1-4.pdf", "1-5.pdf"],
      chapter2: ["2-1.pdf", "2-2.pdf", "2-3.pdf"],
      chapter3: ["3-1.pdf", "3-2.pdf", "3-3.pdf"],
      chapter14: ["14-1.pdf", "14-2.pdf", "14-3.pdf"],
      chapterex: ["ex-1.pdf", "ex-2.pdf"]
    };

    let currentChapter = "chapter1";
    let currentFile = chapters.chapter1[0];
    let currentPage = 1;

    const chapterSelect = document.getElementById("chapterSelect");
    const fileSelect = document.getElementById("fileSelect");
    const pageInfo = document.getElementById("pageInfo");
    const pdfFrame = document.getElementById("pdfFrame");
    const statusLine = document.getElementById("statusLine");

    // 초기화 로직
    for (const ch in chapters) {
      const option = document.createElement("option");
      option.value = ch;
      option.textContent = ch.toUpperCase();
      chapterSelect.appendChild(option);
    }

    function updateFileOptions(ch) {
      fileSelect.innerHTML = "";
      chapters[ch].forEach((file) => {
        const option = document.createElement("option");
        option.value = file;
        option.textContent = file;
        fileSelect.appendChild(option);
      });
      currentFile = chapters[ch][0];
    }

    async function updateView(isStart = true) {
      const pdfPath = `${currentChapter}/${currentFile}`;
      pdfFrame.src = `/pdfjs_clean/web/viewer.html?file=/${pdfPath}#page=${currentPage}`;
      pageInfo.textContent = `${currentPage} P`;

      try {
        await set(ref(db, `rooms/${roomId}`), {
          pdf: pdfPath,
          page: currentPage,
          started: isStart,
          updatedAt: Date.now()
        });
        statusLine.textContent = "● Synced: " + currentFile;
        statusLine.style.color = "#28a745";
      } catch (err) {
        statusLine.textContent = "● Sync Error";
        statusLine.style.color = "red";
      }
    }

    chapterSelect.addEventListener("change", (e) => {
      currentChapter = e.target.value;
      updateFileOptions(currentChapter);
      currentPage = 1;
      updateView();
    });

    fileSelect.addEventListener("change", (e) => {
      currentFile = e.target.value;
      currentPage = 1;
      updateView();
    });

    document.getElementById("prevBtn").addEventListener("click", () => {
      if (currentPage > 1) { currentPage--; updateView(); }
    });

    document.getElementById("nextBtn").addEventListener("click", () => {
      currentPage++; updateView();
    });

    document.getElementById("startBtn").addEventListener("click", () => {
      updateView(true);
      alert("수업 시작 신호를 학생들에게 전송했습니다!");
    });

    updateFileOptions(currentChapter);
    updateView(); 

  </script>
</body>
</html>
